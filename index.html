<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNASystems: Encryption</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="app-container">
        <header class="app-header">
            <h1>PNASystems Encryption</h1>
            <p>Secure, client-side encryption &amp; decryption</p>
        </header>

        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="encrypt-text" role="tab" aria-selected="true">Encrypt Text</button>
            <button class="tab-btn" data-tab="decrypt-text" role="tab" aria-selected="false">Decrypt Text</button>
            <button class="tab-btn" data-tab="encrypt-file" role="tab" aria-selected="false">Encrypt File</button>
            <button class="tab-btn" data-tab="decrypt-file" role="tab" aria-selected="false">Decrypt File</button>
        </nav>

        <main>
            <!-- Encrypt Text Tab -->
            <section id="encrypt-text" class="tab-content active" role="tabpanel">
                <div class="panel">
                    <div class="form-group">
                        <label for="et-plaintext">Plaintext</label>
                        <textarea id="et-plaintext" placeholder="Enter text to encrypt..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="et-password">Password</label>
                        <input type="password" id="et-password" placeholder="Enter encryption password...">
                    </div>
                    <div class="form-group">
                        <label>Encryption Method</label>
                        <select id="et-method">
                            <option value="0">AES-256-GCM</option>
                            <option value="1">Fernet (AES-128-CBC + HMAC)</option>
                            <option value="3">ChaCha20-Poly1305</option>
                            <option value="4">XChaCha20-Poly1305</option>
                            <option value="5">TripleDES-192-CBC + HMAC</option>
                            <option value="6">Rabbit + HMAC</option>
                            <option value="7">Blowfish + HMAC</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="et-encrypt-btn">Encrypt</button>
                    </div>
                    <div class="output-header" style="margin-top: 1.25rem;">
                        <span>Encrypted Output (Base64)</span>
                        <button class="btn-copy" id="et-copy-btn">Copy</button>
                    </div>
                    <div class="output-area" id="et-output"></div>
                </div>
            </section>

            <!-- Decrypt Text Tab -->
            <section id="decrypt-text" class="tab-content" role="tabpanel">
                <div class="panel">
                    <div class="form-group">
                        <label for="dt-ciphertext">Encrypted Text (Base64)</label>
                        <textarea id="dt-ciphertext" placeholder="Paste encrypted Base64 text..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dt-password">Password</label>
                        <input type="password" id="dt-password" placeholder="Enter decryption password...">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="dt-decrypt-btn">Decrypt</button>
                    </div>
                    <div class="output-header" style="margin-top: 1.25rem;">
                        <span>Decrypted Output</span>
                        <button class="btn-copy" id="dt-copy-btn">Copy</button>
                    </div>
                    <div class="output-area" id="dt-output"></div>
                </div>
            </section>

            <!-- Encrypt File Tab -->
            <section id="encrypt-file" class="tab-content" role="tabpanel">
                <div class="panel">
                    <div class="form-group">
                        <label for="ef-file">Select File</label>
                        <input type="file" id="ef-file">
                    </div>
                    <div class="form-group">
                        <label for="ef-password">Password</label>
                        <input type="password" id="ef-password" placeholder="Enter encryption password...">
                    </div>
                    <div class="form-group">
                        <label>Encryption Method</label>
                        <select id="ef-method">
                            <option value="0">AES-256-GCM</option>
                            <option value="1">Fernet (AES-128-CBC + HMAC)</option>
                            <option value="3">ChaCha20-Poly1305</option>
                            <option value="4">XChaCha20-Poly1305</option>
                            <option value="5">TripleDES-192-CBC + HMAC</option>
                            <option value="6">Rabbit + HMAC</option>
                            <option value="7">Blowfish + HMAC</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="ef-encrypt-btn">Encrypt &amp; Download</button>
                    </div>
                </div>
            </section>

            <!-- Decrypt File Tab -->
            <section id="decrypt-file" class="tab-content" role="tabpanel">
                <div class="panel">
                    <div class="form-group">
                        <label for="df-file">Select Encrypted File</label>
                        <input type="file" id="df-file">
                    </div>
                    <div class="form-group">
                        <label for="df-password">Password</label>
                        <input type="password" id="df-password" placeholder="Enter decryption password...">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="df-decrypt-btn">Decrypt &amp; Download</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>PNASystems Encryption &mdash; All operations run locally in your browser. No data is ever sent to a server.</p>
            <p>Original Creator: Roblox User <a href="https://github.com/Goplop0959" target="_blank" rel="noopener">Goplop0959</a></p>
        </footer>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- CryptoJS full bundle from CDN (includes AES, TripleDES, Rabbit, Blowfish, HMAC, PBKDF2, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
    <!-- Base85 encoding utility -->
    <script src="base85.js"></script>
    <!-- Fernet encryption implementation -->
    <script src="fernet.js"></script>
    <!-- Core crypto engine -->
    <script src="crypto-engine.js"></script>
    <!-- Application logic -->
    <script src="app.js"></script>
</body>
</html>
